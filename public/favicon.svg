<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#000000"/>

  <!-- Monitor frame -->
  <rect x="2" y="3" width="28" height="20" rx="2" ry="2"
        fill="none" stroke="#6fc3df" stroke-width="1.5"/>

  <!-- Screen glow fill -->
  <rect x="3.75" y="4.75" width="24.5" height="16.5" rx="1" ry="1"
        fill="#050f13"/>

  <!-- LCD content bars (simulating text on screen) -->
  <rect x="6" y="8"  width="14" height="1.5" rx="0.75" fill="#6fc3df"/>
  <rect x="6" y="12" width="20" height="1.5" rx="0.75" fill="#6fc3df" opacity="0.75"/>
  <rect x="6" y="16" width="11" height="1.5" rx="0.75" fill="#6fc3df" opacity="0.5"/>

  <!-- Cursor blink block -->
  <rect x="21" y="16" width="1.5" height="1.5" fill="#6fc3df"/>

  <!-- Stand neck -->
  <rect x="14.25" y="23" width="3.5" height="3" fill="#6fc3df" opacity="0.8"/>

  <!-- Stand base -->
  <rect x="10" y="26" width="12" height="1.5" rx="0.75" fill="#6fc3df" opacity="0.8"/>
</svg>
